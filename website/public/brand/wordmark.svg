<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 64" role="img" aria-label="FRONTIER">
  <!-- Stepped-F mark + mono wordmark lockup -->
  <g>
    <rect x="0" y="12" width="6" height="40" rx="1" fill="#e6e8ea"/>
    <rect x="0" y="12" width="30" height="6" rx="1" fill="#f0b90b"/>
    <rect x="0" y="24" width="23" height="6" rx="1" fill="#2ebd85"/>
    <rect x="0" y="36" width="16" height="6" rx="1" fill="#1ea06d"/>
  </g>
  <text x="46" y="44" font-family="ui-monospace, 'JetBrains Mono', 'SF Mono', Menlo, Consolas, monospace"
        font-size="34" font-weight="800" letter-spacing="6" fill="#e6e8ea">FRONTIER</text>
  <rect x="350" y="20" width="6" height="26" fill="#2ebd85">
    <animate attributeName="opacity" values="1;1;0;0" dur="1.1s" repeatCount="indefinite"/>
  </rect>
</svg>
