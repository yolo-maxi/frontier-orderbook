<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Frontier mark">
  <!-- Stepped-F motif: a ladder of price levels resolving into an F.
       Geometric/mono hybrid. The top step is gold (your touch / the frontier),
       the descending rungs are signal green. -->
  <rect width="64" height="64" rx="12" fill="#0b0e11"/>
  <!-- spine -->
  <rect x="14" y="12" width="6" height="40" rx="1" fill="#e6e8ea"/>
  <!-- top rung: the frontier (gold) -->
  <rect x="14" y="12" width="34" height="6" rx="1" fill="#f0b90b"/>
  <!-- second rung -->
  <rect x="14" y="24" width="26" height="6" rx="1" fill="#2ebd85"/>
  <!-- third rung (deeper / shorter — the book thinning out) -->
  <rect x="14" y="36" width="18" height="6" rx="1" fill="#1ea06d"/>
</svg>
